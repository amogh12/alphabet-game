<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background tile -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Shine highlight -->
  <rect width="64" height="32" rx="14" fill="url(#shine)"/>
  <!-- Bottom shadow strip -->
  <rect x="4" y="56" width="56" height="4" rx="4" fill="#CC4400" opacity="0.3"/>
  <!-- ABC text -->
  <text x="32" y="44"
    font-family="'Arial Black', 'Arial Rounded MT Bold', Arial, sans-serif"
    font-weight="900" font-size="28" fill="white"
    text-anchor="middle" letter-spacing="1">ABC</text>
</svg>
