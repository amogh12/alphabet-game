<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FFF9F0">
<title>ABC Fun!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF9F0;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    background-image: radial-gradient(circle at 10% 20%, #FFE5B4 0%, transparent 40%),
                      radial-gradient(circle at 90% 80%, #C8F7C5 0%, transparent 40%),
                      radial-gradient(circle at 50% 50%, #D6EAF8 0%, transparent 60%);
    padding-bottom: max(24px, var(--safe-bottom));
  }

  header {
    text-align: center;
    padding: 20px 16px 6px;
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 8vw, 3.5rem);
    color: #FF6B6B;
    text-shadow: 4px 4px 0 #FFB347;
    letter-spacing: 2px;
  }
  header p {
    font-size: 1rem;
    color: #888;
    margin-top: 2px;
  }

  /* Score bar */
  #scorebar {
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 8px;
    font-size: 1rem;
    font-weight: 800;
    color: #555;
  }
  .score-pill {
    background: white;
    border-radius: 40px;
    padding: 6px 18px;
    box-shadow: 0 4px 0 #ddd;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Game area */
  #game {
    max-width: 520px;
    margin: 0 auto;
    padding: 8px 14px 20px;
  }

  /* Question card */
  #question-card {
    background: white;
    border-radius: 28px;
    padding: 20px 20px 16px;
    text-align: center;
    box-shadow: 0 8px 0 #E0D5C8;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  #question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: linear-gradient(90deg, #FF6B6B, #FFB347, #FDFD96, #C8F7C5, #AED6F1, #D7BDE2);
  }

  #big-letter {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(5rem, 18vw, 8rem);
    line-height: 1;
    margin-bottom: 4px;
    cursor: pointer;
    display: inline-block;
    transition: transform 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }
  #big-letter:active {
    transform: scale(0.9);
  }
  #big-letter::after {
    content: '🔊';
    font-size: 0.28em;
    position: absolute;
    bottom: 0.2em;
    right: -0.5em;
    opacity: 0.5;
  }
  #big-letter.pop {
    animation: pop 0.4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop {
    0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
    80% { transform: scale(1.1) rotate(3deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  #question-text {
    font-size: 1.15rem;
    font-weight: 700;
    color: #555;
  }
  #question-text span {
    font-weight: 800;
    color: #FF6B6B;
  }

  /* Answer grid */
  #answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 10px;
  }

  .answer-btn {
    background: white;
    border: 4px solid transparent;
    border-radius: 22px;
    padding: 14px 10px;
    cursor: pointer;
    text-align: center;
    box-shadow: 0 7px 0 #ddd;
    transition: transform 0.12s, box-shadow 0.12s, background 0.2s, border-color 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    -webkit-tap-highlight-color: transparent;
    outline: none;
    touch-action: manipulation;
    min-height: 100px;
  }
  .answer-btn:not(:disabled):active {
    transform: translateY(4px);
    box-shadow: 0 3px 0 #ddd;
  }
  .answer-btn:disabled {
    cursor: default;
  }
  .answer-btn .emoji {
    font-size: clamp(2.2rem, 9vw, 3.5rem);
    line-height: 1;
    transition: transform 0.3s;
  }
  .answer-btn .word {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1rem, 3.5vw, 1.3rem);
    color: #444;
    letter-spacing: 1px;
  }
  .answer-btn .first-letter {
    font-size: 1.3em;
    color: #FF6B6B;
  }

  .answer-btn.correct {
    background: #C8F7C5;
    border-color: #5CB85C;
    box-shadow: 0 7px 0 #4a9b4a;
    animation: wiggle 0.5s ease;
  }
  .answer-btn.correct .emoji {
    animation: big-bounce 0.6s cubic-bezier(.34,1.56,.64,1);
  }
  .answer-btn.wrong {
    background: #FFE8E8;
    border-color: #E74C3C;
    box-shadow: 0 7px 0 #b03a2e;
    animation: shake 0.35s ease;
    opacity: 0.65;
  }
  .answer-btn.hint-glow {
    border-color: #FFB347;
    box-shadow: 0 7px 0 #e8960a;
    animation: pulse-hint 0.8s ease infinite;
  }

  @keyframes wiggle {
    0%,100%{transform:rotate(0) scale(1)}
    25%{transform:rotate(-6deg) scale(1.06)}
    75%{transform:rotate(6deg) scale(1.06)}
  }
  @keyframes big-bounce {
    0%{transform:scale(1)}
    50%{transform:scale(1.4)}
    100%{transform:scale(1)}
  }
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-10px)}
    40%{transform:translateX(10px)}
    60%{transform:translateX(-6px)}
    80%{transform:translateX(6px)}
  }
  @keyframes pulse-hint {
    0%,100%{transform:scale(1); background:#FFF8E8;}
    50%{transform:scale(1.04); background:#FFE8C0;}
  }

  /* Try-again message */
  #try-again-msg {
    text-align: center;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    color: #FF8C42;
    min-height: 2rem;
    transition: opacity 0.3s, transform 0.3s;
    opacity: 0;
    transform: translateY(4px);
    margin-bottom: 6px;
  }
  #try-again-msg.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* Hint button */
  #hint-area {
    text-align: center;
    margin-bottom: 10px;
    min-height: 44px;
  }
  #hint-btn {
    background: white;
    border: 3px solid #FFB347;
    border-radius: 50px;
    padding: 8px 22px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    color: #FF8C42;
    cursor: pointer;
    box-shadow: 0 4px 0 #e8960a;
    transition: transform 0.1s, box-shadow 0.1s, opacity 0.3s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    opacity: 0;
    pointer-events: none;
  }
  #hint-btn.visible {
    opacity: 1;
    pointer-events: all;
  }
  #hint-btn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #e8960a;
  }

  /* Feedback overlay */
  #feedback {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.9);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    font-family: 'Fredoka One', cursive;
    text-align: center;
    padding: 20px;
  }
  #feedback.show {
    opacity: 1;
    pointer-events: all;
  }
  #feedback .fb-emoji {
    font-size: clamp(4rem, 15vw, 6rem);
    animation: bounce 0.5s infinite alternate;
  }
  @keyframes bounce {
    from { transform: translateY(0) scale(1); }
    to   { transform: translateY(-20px) scale(1.05); }
  }
  #feedback .fb-msg {
    font-size: clamp(1.8rem, 7vw, 2.5rem);
    color: #FF6B6B;
    margin-top: 10px;
  }
  #feedback .fb-sub {
    font-size: clamp(1rem, 4vw, 1.3rem);
    color: #888;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    margin-top: 6px;
    max-width: 320px;
  }

  /* Progress dots */
  #progress {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .dot {
    width: 13px; height: 13px;
    border-radius: 50%;
    background: #ddd;
    transition: background 0.3s, transform 0.3s;
  }
  .dot.done { background: #5CB85C; transform: scale(1.2); }
  .dot.current { background: #FF6B6B; transform: scale(1.35); }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 12px; height: 12px;
    border-radius: 2px;
    opacity: 0;
    pointer-events: none;
    z-index: 200;
    animation: confetti-fall 1.4s ease-out forwards;
  }
  @keyframes confetti-fall {
    0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(85vh) rotate(720deg); }
  }

  /* Sound mute toggle */
  #sound-toggle {
    position: fixed;
    top: 14px;
    right: 14px;
    background: white;
    border: 3px solid #ddd;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    font-size: 1.3rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 0 #ddd;
    z-index: 50;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
</style>
</head>
<body>

<button id="sound-toggle" title="Toggle sound" aria-label="Toggle sound">🔊</button>

<header>
  <h1>🔤 ABC Fun!</h1>
  <p>Match the picture to the letter!</p>
</header>

<div id="scorebar">
  <div class="score-pill">⭐ <span id="score">0</span></div>
  <div class="score-pill">🎯 Round <span id="round">1</span></div>
</div>

<div id="game">
  <div id="progress"></div>

  <div id="question-card">
    <div id="big-letter" role="button" tabindex="0" aria-label="Click to hear the letter">A</div>
    <div id="question-text">Which one starts with <span id="letter-name">A</span>?</div>
  </div>

  <div id="answers"></div>
  <div id="try-again-msg"></div>
  <div id="hint-area"><button id="hint-btn">💡 Hint</button></div>
</div>

<div id="feedback" role="dialog" aria-modal="true">
  <div class="fb-emoji" id="fb-emoji">🎉</div>
  <div class="fb-msg" id="fb-msg">Yay!</div>
  <div class="fb-sub" id="fb-sub"></div>
</div>

<script>
const ITEMS = [
  { letter:'A', emoji:'🍎', word:'Apple' },
  { letter:'B', emoji:'🐝', word:'Bee' },
  { letter:'C', emoji:'🐱', word:'Cat' },
  { letter:'D', emoji:'🐶', word:'Dog' },
  { letter:'E', emoji:'🥚', word:'Egg' },
  { letter:'F', emoji:'🐸', word:'Frog' },
  { letter:'G', emoji:'🍇', word:'Grapes' },
  { letter:'H', emoji:'🏠', word:'House' },
  { letter:'I', emoji:'🍦', word:'Ice cream' },
  { letter:'J', emoji:'🃏', word:'Joker' },
  { letter:'K', emoji:'🪁', word:'Kite' },
  { letter:'L', emoji:'🦁', word:'Lion' },
  { letter:'M', emoji:'🌙', word:'Moon' },
  { letter:'N', emoji:'🌰', word:'Nut' },
  { letter:'O', emoji:'🦉', word:'Owl' },
  { letter:'P', emoji:'🐧', word:'Penguin' },
  { letter:'Q', emoji:'👸', word:'Queen' },
  { letter:'R', emoji:'🌈', word:'Rainbow' },
  { letter:'S', emoji:'⭐', word:'Star' },
  { letter:'T', emoji:'🐢', word:'Turtle' },
  { letter:'U', emoji:'☂️', word:'Umbrella' },
  { letter:'V', emoji:'🎻', word:'Violin' },
  { letter:'W', emoji:'🐋', word:'Whale' },
  { letter:'X', emoji:'🎄', word:'Xmas tree' },
  { letter:'Y', emoji:'🪀', word:'Yo-yo' },
  { letter:'Z', emoji:'🦓', word:'Zebra' },
];

const COLORS = ['#FF6B6B','#FF8C42','#A569BD','#2E86C1','#28B463','#D4A017','#E91E8C'];

const PRAISE = [
  ['🎉','Amazing!','You got it!'],
  ['⭐','Superstar!','That\'s right!'],
  ['🌈','Wonderful!','Keep going!'],
  ['🎊','Brilliant!','You\'re so smart!'],
  ['🦄','Fantastic!','High five! ✋'],
  ['🏆','Perfect!','You rock! 🎸'],
  ['🌟','Great job!','Yes, yes, yes!'],
];

const ENCOURAGE = [
  "Oops! Try another one! 💪",
  "Not that one! Keep looking! 🔍",
  "Almost! You can do it! 🌟",
  "Try again — you\'ve got this! 😊",
  "Look at the letter! Try again! 🔤",
  "Don\'t give up! Keep trying! 🚀",
];

const ROUNDS = 8;

let queue = [], current = null, score = 0, roundNum = 0;
let wrongCount = 0;       // wrong attempts for current question
let soundEnabled = true;
let audioCtx = null;

// ── Audio ────────────────────────────────────────────────────────────────────

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  // Resume if suspended (browser autoplay policy)
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, startTime, duration, type = 'sine', volume = 0.25) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  gain.gain.setValueAtTime(volume, startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

function playSound(type) {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    if (type === 'correct') {
      // Happy ascending chime
      [523, 659, 784, 1047].forEach((f, i) => playTone(f, now + i * 0.13, 0.4, 'sine', 0.22));
    } else if (type === 'wrong') {
      // Gentle descending boop — not harsh
      playTone(350, now, 0.15, 'sine', 0.18);
      playTone(270, now + 0.15, 0.2, 'sine', 0.15);
    } else if (type === 'fanfare') {
      // End-of-game fanfare
      const notes = [523,659,784,659,784,1047];
      notes.forEach((f, i) => playTone(f, now + i * 0.12, 0.25, 'triangle', 0.25));
    } else if (type === 'hint') {
      playTone(880, now, 0.1, 'sine', 0.15);
      playTone(1100, now + 0.12, 0.15, 'sine', 0.12);
    }
  } catch(e) {
    // AudioContext not available — silently ignore
  }
}

function sayLetter(letter) {
  if (!soundEnabled) return;
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(letter);
  utter.rate = 0.75;
  utter.pitch = 1.3;
  utter.volume = 1;
  window.speechSynthesis.speak(utter);
}

function sayWord(word) {
  if (!soundEnabled) return;
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(word);
  utter.rate = 0.85;
  utter.pitch = 1.2;
  utter.volume = 1;
  window.speechSynthesis.speak(utter);
}

// ── Helpers ──────────────────────────────────────────────────────────────────

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildProgress() {
  const el = document.getElementById('progress');
  el.innerHTML = '';
  for (let i = 0; i < ROUNDS; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < roundNum ? ' done' : i === roundNum ? ' current' : '');
    el.appendChild(d);
  }
}

// ── Game flow ────────────────────────────────────────────────────────────────

function nextQuestion() {
  if (roundNum >= ROUNDS) { showEnd(); return; }

  wrongCount = 0;
  hideTryAgainMsg();
  hideHint();

  current = queue[roundNum];
  const colorIdx = roundNum % COLORS.length;
  const bl = document.getElementById('big-letter');
  bl.style.color = COLORS[colorIdx];
  bl.textContent = current.letter;
  document.getElementById('letter-name').textContent = current.letter;
  document.getElementById('round').textContent = roundNum + 1;

  // Pop-in animation
  bl.classList.remove('pop');
  void bl.offsetWidth;
  bl.classList.add('pop');

  // Say the letter automatically
  setTimeout(() => sayLetter(current.letter), 300);

  // Build options
  const pool = ITEMS.filter(i => i.letter !== current.letter);
  shuffle(pool);
  const options = shuffle([current, pool[0], pool[1], pool[2]]);

  const container = document.getElementById('answers');
  container.innerHTML = '';
  options.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.setAttribute('aria-label', item.word);
    const firstLetter = item.word[0];
    const rest = item.word.slice(1);
    btn.innerHTML = `
      <span class="emoji">${item.emoji}</span>
      <span class="word"><span class="first-letter">${firstLetter}</span>${rest}</span>
    `;
    btn.addEventListener('click', () => handleAnswer(btn, item));
    container.appendChild(btn);
  });

  buildProgress();
}

function handleAnswer(btn, item) {
  if (btn.disabled || btn.classList.contains('wrong') || btn.classList.contains('correct')) return;

  if (item.letter === current.letter) {
    // ✅ CORRECT
    btn.classList.add('correct');
    // Disable all buttons so no more clicks
    document.querySelectorAll('.answer-btn').forEach(b => { b.disabled = true; });
    score++;
    document.getElementById('score').textContent = score;
    hideTryAgainMsg();
    hideHint();
    spawnConfetti();
    playSound('correct');
    sayWord(item.word);

    const p = PRAISE[Math.floor(Math.random() * PRAISE.length)];
    roundNum++;
    setTimeout(() => {
      showFeedback(p[0], p[1], `${current.emoji} ${current.word} starts with ${current.letter}!`, true);
    }, 400);

  } else {
    // ❌ WRONG — stay on same question
    btn.classList.add('wrong');
    btn.disabled = true;
    wrongCount++;
    playSound('wrong');
    showTryAgainMsg();

    // Show hint button after first wrong answer
    if (wrongCount >= 1) showHint();

    // Auto-pulse hint after 2 wrong answers
    if (wrongCount >= 2) {
      activateHint();
    }
  }
}

// ── Feedback overlay ─────────────────────────────────────────────────────────

function showFeedback(emoji, msg, sub, good) {
  const fb = document.getElementById('feedback');
  document.getElementById('fb-emoji').textContent = emoji;
  document.getElementById('fb-msg').textContent = msg;
  document.getElementById('fb-msg').style.color = good ? '#FF6B6B' : '#E67E22';
  document.getElementById('fb-sub').textContent = sub;
  fb.classList.add('show');
  setTimeout(() => {
    fb.classList.remove('show');
    nextQuestion();
  }, 1800);
}

function showEnd() {
  playSound('fanfare');
  spawnConfetti(); spawnConfetti();
  const stars = score >= ROUNDS ? '🌟🌟🌟' : score >= Math.ceil(ROUNDS * 0.7) ? '⭐⭐⭐' : score >= Math.ceil(ROUNDS * 0.5) ? '⭐⭐' : '⭐';
  const fb = document.getElementById('feedback');
  document.getElementById('fb-emoji').textContent = '🎓';
  document.getElementById('fb-msg').textContent = `${stars} ${score}/${ROUNDS}`;
  document.getElementById('fb-msg').style.color = '#FF6B6B';
  document.getElementById('fb-sub').textContent = score === ROUNDS
    ? 'Perfect score! You\'re a genius! 🏆'
    : 'Great job! Let\'s play again! 🔄';
  fb.classList.add('show');
  setTimeout(() => {
    fb.classList.remove('show');
    restartGame();
  }, 3500);
}

// ── Try-again message ─────────────────────────────────────────────────────────

function showTryAgainMsg() {
  const el = document.getElementById('try-again-msg');
  el.textContent = ENCOURAGE[Math.floor(Math.random() * ENCOURAGE.length)];
  // Briefly pop it off then back on to re-trigger animation even if already shown
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

function hideTryAgainMsg() {
  document.getElementById('try-again-msg').classList.remove('show');
}

// ── Hint ──────────────────────────────────────────────────────────────────────

function showHint() {
  const btn = document.getElementById('hint-btn');
  btn.classList.add('visible');
}

function hideHint() {
  const btn = document.getElementById('hint-btn');
  btn.classList.remove('visible');
  // Remove hint-glow from any answer buttons
  document.querySelectorAll('.answer-btn.hint-glow').forEach(b => b.classList.remove('hint-glow'));
}

function activateHint() {
  playSound('hint');
  // Find the correct answer button and pulse it
  document.querySelectorAll('.answer-btn').forEach(btn => {
    if (!btn.disabled) {
      // The only enabled non-wrong button must be correct (or one of the remaining)
      // Match by checking word text
      const wordEl = btn.querySelector('.word');
      if (wordEl) {
        const word = wordEl.textContent.trim();
        if (word.startsWith(current.letter) || word.toUpperCase().startsWith(current.letter)) {
          btn.classList.add('hint-glow');
        }
      }
    }
  });
}

document.getElementById('hint-btn').addEventListener('click', () => {
  activateHint();
  playSound('hint');
});

// ── Letter pronunciation on click ────────────────────────────────────────────

document.getElementById('big-letter').addEventListener('click', () => {
  sayLetter(current.letter);
  const bl = document.getElementById('big-letter');
  bl.classList.remove('pop');
  void bl.offsetWidth;
  bl.classList.add('pop');
});
document.getElementById('big-letter').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') sayLetter(current.letter);
});

// ── Sound toggle ─────────────────────────────────────────────────────────────

document.getElementById('sound-toggle').addEventListener('click', () => {
  soundEnabled = !soundEnabled;
  document.getElementById('sound-toggle').textContent = soundEnabled ? '🔊' : '🔇';
  if (soundEnabled) playSound('hint'); // little confirmation beep
});

// ── Confetti ──────────────────────────────────────────────────────────────────

function spawnConfetti() {
  const colors = ['#FF6B6B','#FFB347','#FDFD96','#5CB85C','#5BC0DE','#D7BDE2','#FF69B4'];
  for (let i = 0; i < 32; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.top = '-20px';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = Math.random() * 0.6 + 's';
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    c.style.width = c.style.height = (8 + Math.random() * 10) + 'px';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 2200);
  }
}

// ── Restart ───────────────────────────────────────────────────────────────────

function restartGame() {
  score = 0;
  roundNum = 0;
  document.getElementById('score').textContent = 0;
  queue = shuffle([...ITEMS]).slice(0, ROUNDS);
  nextQuestion();
}

// ── Start! ────────────────────────────────────────────────────────────────────
queue = shuffle([...ITEMS]).slice(0, ROUNDS);
nextQuestion();
</script>
