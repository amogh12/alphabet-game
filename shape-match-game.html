<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FFF9F0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<title>Shape Match – ABC Fun!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="shape-match-theme">

<button id="sound-toggle" aria-label="Toggle sound">🔊</button>
<a id="back-btn" href="index.html">← Home</a>

<header>
  <h1>🔶 Shape Match!</h1>
  <p>Hear the shape and tap it!</p>
</header>

<div id="scorebar">
  <div class="score-pill">⭐ <span id="score">0</span></div>
  <div class="score-pill">🎯 Round <span id="round">1</span></div>
</div>

<div id="game">
  <div id="progress" class="dots-row"></div>
  <div id="shape-match-card">
    <div id="shape-match-prompt">Which shape do you hear?</div>
    <button id="shape-match-sound-btn" aria-label="Say the shape name">🔊</button>
  </div>
  <div id="shape-match-answers"></div>
  <div id="try-again-msg"></div>
  <div id="hint-area"><button id="hint-btn">💡 Hint</button></div>
</div>

<div id="feedback" role="dialog" aria-modal="true">
  <div class="fb-emoji" id="fb-emoji">🎉</div>
  <div class="fb-msg"   id="fb-msg">Yay!</div>
  <div class="fb-sub"   id="fb-sub"></div>
</div>

<script src="js/shared.js"></script>
<script src="js/shape-match-game.js"></script>
</body>
</html>
