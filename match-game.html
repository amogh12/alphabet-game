<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FFF9F0">
<title>Number Match – ABC Fun!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="number-theme">

<button id="sound-toggle" aria-label="Toggle sound">🔊</button>
<a id="back-btn" href="index.html">← Home</a>

<header>
  <h1>🃏 Number Match!</h1>
  <p>Flip cards to match numbers and dots!</p>
</header>

<div id="scorebar">
  <div class="score-pill">✅ <span id="matched">0</span> / 5</div>
  <div class="score-pill">👆 Moves: <span id="moves">0</span></div>
</div>

<div class="num-game">
  <div id="match-card" class="num-card">
    <div id="match-status">Find all 5 pairs!</div>
    <div id="match-grid"></div>
  </div>
</div>

<div id="feedback" role="dialog" aria-modal="true">
  <div class="fb-emoji" id="fb-emoji">🎉</div>
  <div class="fb-msg"   id="fb-msg">Yay!</div>
  <div class="fb-sub"   id="fb-sub"></div>
</div>

<script src="js/shared.js"></script>
<script src="js/match-game.js"></script>
</body>
</html>
