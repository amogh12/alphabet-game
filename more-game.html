<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FFF9F0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<title>More or Less – ABC Fun!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="more-theme">

<button id="sound-toggle" aria-label="Toggle sound">🔊</button>
<a id="back-btn" href="index.html">← Home</a>

<header>
  <h1>⚖️ More or Less!</h1>
  <p>Which side has more?</p>
</header>

<div id="scorebar">
  <div class="score-pill">⭐ <span id="score">0</span></div>
  <div class="score-pill">🎯 Round <span id="round">1</span></div>
</div>

<div id="game">
  <div id="progress" class="dots-row"></div>
  <div id="more-card">
    <div id="more-question">Which side has more?</div>
    <button id="more-sound-btn" aria-label="Hear the question">🔊</button>
  </div>
  <div id="more-arena">
    <button class="side-btn" id="side-left" aria-label="Left side">
      <div class="side-objects" id="objects-left"></div>
    </button>
    <div class="more-vs">VS</div>
    <button class="side-btn" id="side-right" aria-label="Right side">
      <div class="side-objects" id="objects-right"></div>
    </button>
  </div>
  <div id="try-again-msg"></div>
  <div id="hint-area"><button id="hint-btn">💡 Hint</button></div>
</div>

<div id="feedback" role="dialog" aria-modal="true">
  <div class="fb-emoji" id="fb-emoji">🎉</div>
  <div class="fb-msg"   id="fb-msg">Yay!</div>
  <div class="fb-sub"   id="fb-sub"></div>
</div>

<script src="js/shared.js"></script>
<script src="js/more-game.js"></script>
</body>
</html>
