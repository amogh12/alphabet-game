<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FFF9F0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<title>Trace Words – ABC Fun!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<button id="sound-toggle" aria-label="Toggle sound">🔊</button>
<a id="back-btn" href="index.html">← Home</a>

<div id="trace-inner">
  <header>
    <h1>✏️ Trace Words!</h1>
    <p>Trace each letter with your finger</p>
  </header>

  <div id="trace-word-dots" class="dots-row" style="margin-top:12px;"></div>
  <span id="trace-word-emoji">🐱</span>
  <div id="trace-word-display"></div>
  <div id="trace-letter-label">Trace the letter <strong id="trace-current-letter">C</strong>!</div>

  <div id="trace-canvas-wrap">
    <canvas id="trace-canvas"></canvas>
  </div>

  <div id="trace-coverage-wrap">
    <div id="trace-coverage-bar"></div>
  </div>

  <div id="trace-instruction">Draw over the letter!</div>
  <button id="trace-clear-btn">🔄 Clear</button>
</div>

<div id="feedback" role="dialog" aria-modal="true">
  <div class="fb-emoji" id="fb-emoji">🎉</div>
  <div class="fb-msg"   id="fb-msg">Yay!</div>
  <div class="fb-sub"   id="fb-sub"></div>
</div>

<script src="js/shared.js"></script>
<script src="js/trace-game.js"></script>
</body>
</html>
